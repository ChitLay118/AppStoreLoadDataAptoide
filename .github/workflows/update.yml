name: Update Aptoide Categories

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # repo ရဲ့ history အကုန်ယူဖို့

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Script
        run: python scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          # ပြောင်းလဲမှုရှိမှ commit လုပ်မယ်
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update apps.json" && git pull --rebase origin main && git push origin main)
