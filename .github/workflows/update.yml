name: Update Aptoide Data

on:
  schedule:
    # ၄ နာရီတစ်ကြိမ် (မြန်မာစံတော်ချိန် ၄ နာရီ၊ ၈ နာရီ၊ ၁၂ နာရီ စသဖြင့်) run မည်
    - cron: '0 */4 * * *'
  workflow_dispatch: # လိုအပ်လျှင် Manual နှိပ်၍ run ရန်

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          
          # ပြောင်းလဲမှုရှိမှသာ commit လုပ်ပြီး push မည်
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update apps.json (Every 4 hours)"
            # Conflict မဖြစ်စေရန် force push ကို သုံးထားသည်
            git push origin main --force
          else
            echo "No changes to commit"
          fi
